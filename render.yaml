services:
  - type: web
    name: pfe-seller-backend
    runtime: python
    rootDir: backend_django/backend_seller_platform
    buildCommand: pip install -r requirements.txt && cd myproject && python manage.py migrate --noinput
    startCommand: cd myproject && gunicorn backend_seller_platform.wsgi:application --bind 0.0.0.0:8000
    envVars:
      - key: DEBUG
        value: false
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "*.onrender.com,localhost"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://doc-platform-ten.vercel.app"
      - key: DATABASE_URL
        fromDatabase:
          name: postgres
          property: connectionString
